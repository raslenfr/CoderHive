# ? Server Configuration
server.port=8081

# ? Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/coursemanagement?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=raslenferchichi2002

# ? Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ? Performance Optimization
spring.jpa.open-in-view=false

# ? Set the Hibernate Dialect for MySQL 8+
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ? Active Profile
spring.profiles.active=dev

# ? Swagger Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# ? Security Settings
spring.security.basic.enabled=false
management.endpoints.web.exposure.include=*

# ? Static File Serving (Fix for Image Loading Issue)
spring.web.resources.static-locations=file:./uploads/
spring.mvc.static-path-pattern=/uploads/**
